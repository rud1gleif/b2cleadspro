<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B2C Leads Pro</title>
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
    --border: #2e2e2e; --text: #e8e8e8; --muted: #888;
    --primary: #2563eb; --primary-h: #1d4ed8;
    --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
    --gmaps: #2563eb; --yelp: #e11d48; --yp: #f59e0b; --angi: #f97316;
    --gmail-c: #ea4335; --yahoo-c: #7e1fff; --outlook-c: #0078d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 290px; min-width: 290px; background: var(--surface);
             border-right: 1px solid var(--border); display: flex; flex-direction: column;
             padding: 16px; gap: 18px; overflow-y: auto; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--muted);
                   text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; background: var(--surface2);
               border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px;
               min-height: 40px; cursor: text; }
  .tags-wrap:focus-within { border-color: var(--primary); }
  .tag { display: flex; align-items: center; gap: 4px; background: var(--primary);
         color: #fff; border-radius: 5px; padding: 2px 8px; font-size: 12px; }
  .tag button { background: none; border: none; color: #fff; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
  .tags-wrap input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; min-width: 100px; flex: 1; }
  input[type=text], input[type=number] {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; padding: 8px 10px; width: 100%; outline: none; transition: border .15s;
  }
  input:focus { border-color: var(--primary); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: block; }
  .sources-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .src-btn { display: flex; align-items: center; gap: 8px; padding: 8px 10px;
             border-radius: 8px; border: 1px solid var(--border); background: var(--surface2);
             cursor: pointer; font-size: 13px; color: var(--muted); transition: all .15s; }
  .src-btn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .src-btn.active { border-color: currentColor; color: var(--text); }
  .src-btn.active .dot { background: currentColor; }
  .src-btn[data-src=gmaps].active { color: var(--gmaps); }
  .src-btn[data-src=yelp].active  { color: var(--yelp); }
  .src-btn[data-src=yellowpages].active { color: var(--yp); }
  .src-btn[data-src=angi].active  { color: var(--angi); }
  .btn-launch { background: var(--primary); color: #fff; border: none; border-radius: 10px;
                padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer;
                transition: background .15s; width: 100%; }
  .btn-launch:hover { background: var(--primary-h); }
  .btn-launch:disabled { opacity: .5; cursor: not-allowed; }
  .jobs-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; flex: 1; }
  .job-card { padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
              background: var(--surface2); cursor: pointer; transition: border .15s; }
  .job-card:hover, .job-card.active { border-color: var(--primary); }
  .job-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .job-id { font-size: 12px; font-weight: 700; }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
  .badge.done    { background: #14532d; color: var(--green); }
  .badge.running { background: #1e3a5f; color: #60a5fa; }
  .badge.error   { background: #450a0a; color: var(--red); }
  .badge.pending { background: #292524; color: var(--yellow); }
  .job-meta { font-size: 11px; color: var(--muted); }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #top-bar { padding: 14px 20px; border-bottom: 1px solid var(--border);
             display: flex; flex-direction: column; gap: 10px; }
  .top-row1 { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .top-left h2 { font-size: 18px; font-weight: 700; }
  .top-left p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
  .filter-btn { padding: 5px 12px; border-radius: 99px; border: 1px solid var(--border);
                background: none; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .15s; }
  .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  /* Email-only toggle */
  .toggle-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .toggle-wrap input[type=checkbox] { display: none; }
  .toggle-pill { width: 34px; height: 18px; border-radius: 99px; background: var(--border); position: relative; transition: background .2s; flex-shrink: 0; }
  .toggle-pill::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px;
                         border-radius:50%; background:#fff; transition: left .2s; }
  .toggle-wrap input:checked + .toggle-pill { background: var(--green); }
  .toggle-wrap input:checked + .toggle-pill::after { left: 18px; }
  .toggle-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .toggle-wrap input:checked ~ .toggle-label { color: var(--green); font-weight: 600; }
  /* Free-email provider pills */
  .email-type-row { display: flex; gap: 6px; align-items: center; }
  .email-pill { padding: 4px 11px; border-radius: 99px; border: 1px solid var(--border);
                background: none; font-size: 11px; font-weight: 600; cursor: pointer;
                color: var(--muted); transition: all .15s; }
  .email-pill[data-ep=gmail].active  { background:#2d1210; color: var(--gmail-c);   border-color: var(--gmail-c); }
  .email-pill[data-ep=yahoo].active  { background:#1e1030; color: var(--yahoo-c);   border-color: var(--yahoo-c); }
  .email-pill[data-ep=outlook].active{ background:#0d1f30; color: var(--outlook-c); border-color: var(--outlook-c); }
  #email-type-section { display: none; }
  #email-type-section.visible { display: flex; align-items: center; gap: 8px; }
  .count-chip { font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; }
  /* Table */
  .btn-export { background: var(--green); color: #fff; border: none; border-radius: 8px;
                padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
  #table-wrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { position: sticky; top: 0; background: var(--surface); padding: 10px 14px;
             text-align: left; font-size: 11px; font-weight: 600; color: var(--muted);
             text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 9px 14px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .src-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
  .src-badge.gmaps       { background: #1e3a5f; color: #60a5fa; }
  .src-badge.yelp        { background: #450a0a; color: #fca5a5; }
  .src-badge.yellowpages { background: #451a03; color: #fcd34d; }
  .src-badge.angi        { background: #431407; color: #fb923c; }
  /* email-provider dot in table */
  .ep-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; }
  .ep-gmail   { background: var(--gmail-c); }
  .ep-yahoo   { background: var(--yahoo-c); }
  .ep-outlook { background: var(--outlook-c); }
  .empty { text-align: center; padding: 60px; color: var(--muted); }
  a { color: #60a5fa; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<aside id="sidebar">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="7" fill="#2563eb"/>
      <path d="M7 14h4l3-7 3 14 3-7h4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    B2C Leads Pro
  </div>
  <div>
    <div class="section-label">Locations</div>
    <div class="tags-wrap" id="loc-wrap" onclick="document.getElementById('loc-input').focus()">
      <input id="loc-input" placeholder="Type city + Enter" autocomplete="off">
    </div>
  </div>
  <div>
    <div class="section-label">Niches <span style="color:#555;font-weight:400">(optional, comma separated)</span></div>
    <input type="text" id="niches" placeholder="e.g. plumber, electrician">
  </div>
  <div>
    <div class="section-label">Sources</div>
    <div class="sources-grid">
      <button class="src-btn active" data-src="gmaps"><span class="dot"></span>Google Maps</button>
      <button class="src-btn active" data-src="yelp"><span class="dot"></span>Yelp</button>
      <button class="src-btn active" data-src="yellowpages"><span class="dot"></span>YellowPages</button>
      <button class="src-btn active" data-src="angi"><span class="dot"></span>Angi</button>
    </div>
  </div>
  <div class="row2">
    <div class="field"><label>Max Pages</label><input type="number" id="max-pages" value="10" min="1" max="500"></div>
    <div class="field"><label>Concurrency</label><input type="number" id="concurrency" value="3" min="1" max="20"></div>
  </div>
  <button class="btn-launch" id="btn-launch" onclick="launchJob()">&#128640; Launch Job</button>
  <div>
    <div class="section-label">Recent Jobs</div>
    <div class="jobs-list" id="jobs-list"></div>
  </div>
</aside>

<main id="main">
  <div id="top-bar">
    <!-- Row 1: job title + export -->
    <div class="top-row1">
      <div class="top-left">
        <h2 id="job-title">No job selected</h2>
        <p id="job-meta"></p>
      </div>
      <button class="btn-export" onclick="exportCSV()">&#8595; Export CSV</button>
    </div>

    <!-- Row 2: source filter + separator + email-only toggle -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-filter="gmaps" onclick="setFilter('gmaps')">gmaps</button>
      <button class="filter-btn" data-filter="yelp" onclick="setFilter('yelp')">yelp</button>
      <button class="filter-btn" data-filter="yellowpages" onclick="setFilter('yellowpages')">yellowpages</button>
      <button class="filter-btn" data-filter="angi" onclick="setFilter('angi')">angi</button>

      <div class="filter-sep"></div>

      <!-- Email-only toggle -->
      <label class="toggle-wrap" title="Only show leads that have an email address">
        <input type="checkbox" id="chk-email-only" onchange="onEmailOnlyToggle()">
        <span class="toggle-pill"></span>
        <span class="toggle-label">With Email Only</span>
      </label>

      <div class="filter-sep"></div>

      <!-- Provider pills (shown only when email-only is ON) -->
      <div id="email-type-section">
        <span style="font-size:11px;color:var(--muted);white-space:nowrap;">Provider:</span>
        <div class="email-type-row">
          <button class="email-pill" data-ep="gmail"  onclick="toggleProvider('gmail')">Gmail</button>
          <button class="email-pill" data-ep="yahoo"  onclick="toggleProvider('yahoo')">Yahoo</button>
          <button class="email-pill" data-ep="outlook" onclick="toggleProvider('outlook')">Outlook</button>
        </div>
      </div>

      <span class="count-chip" id="count-chip"></span>
    </div>
  </div>

  <div id="table-wrap">
    <table>
      <thead><tr>
        <th>Source</th><th>Name</th><th>Phone</th><th>Email</th>
        <th>Website</th><th>Address</th><th>Rating</th><th>Category</th>
        <th>Location</th><th>Niche</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty-msg">Select or launch a job to see leads.</div>
  </div>
</main>

<script>
var API = '';
var currentJobId = null, allLeads = [], currentFilter = 'all';
var emailOnlyActive = false;
var activeProviders = new Set(); // gmail / yahoo / outlook
var pollTimer = null, locations = [];

var locInput = document.getElementById('loc-input');
var locWrap = document.getElementById('loc-wrap');

// ── free-email provider detection ──
var PROVIDER_DOMAINS = {
  gmail:   ['gmail.com'],
  yahoo:   ['yahoo.com','ymail.com'],
  outlook: ['outlook.com','hotmail.com','live.com']
};
function emailProvider(email) {
  if (!email) return null;
  var domain = email.trim().toLowerCase().split('@').pop();
  for (var p in PROVIDER_DOMAINS) {
    if (PROVIDER_DOMAINS[p].indexOf(domain) >= 0) return p;
  }
  return null;
}

// ── location tags ──
locInput.addEventListener('keydown', function(e) {
  if ((e.key === 'Enter' || e.key === ',') && locInput.value.trim()) {
    e.preventDefault();
    addLocation(locInput.value.trim().replace(/,$/, ''));
    locInput.value = '';
  } else if (e.key === 'Backspace' && !locInput.value && locations.length) {
    removeLocation(locations[locations.length - 1]);
  }
});
function addLocation(city) {
  if (!city || locations.indexOf(city) >= 0) return;
  locations.push(city);
  var tag = document.createElement('div');
  tag.className = 'tag'; tag.dataset.city = city;
  var x = document.createElement('button');
  x.textContent = 'x'; x.onclick = function() { removeLocation(city); };
  tag.appendChild(document.createTextNode(city + ' '));
  tag.appendChild(x);
  locWrap.insertBefore(tag, locInput);
}
function removeLocation(city) {
  locations = locations.filter(function(l) { return l !== city; });
  var el = locWrap.querySelector('[data-city="' + CSS.escape(city) + '"]');
  if (el) el.remove();
}

// ── source buttons ──
document.querySelectorAll('.src-btn').forEach(function(btn) {
  btn.addEventListener('click', function() { btn.classList.toggle('active'); });
});
function getActiveSources() {
  return Array.from(document.querySelectorAll('.src-btn.active')).map(function(b) { return b.dataset.src; });
}

// ── email-only toggle ──
function onEmailOnlyToggle() {
  emailOnlyActive = document.getElementById('chk-email-only').checked;
  var sec = document.getElementById('email-type-section');
  if (emailOnlyActive) {
    sec.classList.add('visible');
  } else {
    sec.classList.remove('visible');
    // clear provider selection
    activeProviders.clear();
    document.querySelectorAll('.email-pill').forEach(function(p) { p.classList.remove('active'); });
  }
  renderTable();
}

// ── provider pills ──
function toggleProvider(p) {
  if (activeProviders.has(p)) { activeProviders.delete(p); }
  else { activeProviders.add(p); }
  document.querySelector('.email-pill[data-ep=' + p + ']').classList.toggle('active', activeProviders.has(p));
  renderTable();
}

// ── launch job ──
function launchJob() {
  if (!locations.length) { alert('Please add at least one location.'); return; }
  var sources = getActiveSources();
  if (!sources.length) { alert('Select at least one source.'); return; }
  var nichesRaw = document.getElementById('niches').value.trim();
  var nichesList = nichesRaw ? nichesRaw.split(',').map(function(n) { return n.trim(); }).filter(Boolean) : null;
  var btn = document.getElementById('btn-launch');
  btn.disabled = true; btn.textContent = 'Launching...';
  fetch(API + '/api/jobs/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      locations: locations, niches: nichesList, sources: sources,
      max_pages: parseInt(document.getElementById('max-pages').value) || 10,
      concurrency: parseInt(document.getElementById('concurrency').value) || 3
    })
  }).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(r.status + ': ' + t); });
    return r.json();
  }).then(function(job) {
    loadJob(job.id); loadJobs();
  }).catch(function(e) { alert('Failed: ' + e); })
  .finally(function() { btn.disabled = false; btn.innerHTML = '&#128640; Launch Job'; });
}

// ── job loading ──
function loadJob(id) {
  clearInterval(pollTimer);
  currentJobId = id;
  document.querySelectorAll('.job-card').forEach(function(c) {
    c.classList.toggle('active', +c.dataset.id === id);
  });
  fetchLeads(id);
  fetch(API + '/api/jobs/' + id).then(function(r) { return r.json(); }).then(function(job) {
    if (job.status === 'running' || job.status === 'pending') {
      pollTimer = setInterval(function() {
        fetchLeads(id);
        fetch(API + '/api/jobs/' + id).then(function(r) { return r.json(); }).then(function(j) {
          updateJobMeta(j);
          if (j.status !== 'running' && j.status !== 'pending') clearInterval(pollTimer);
        });
      }, 2000);
    }
    updateJobMeta(job);
  });
}

function fetchLeads(id) {
  fetch(API + '/api/leads/?job_id=' + id + '&limit=5000')
    .then(function(r) { return r.json(); })
    .then(function(data) { allLeads = data; renderTable(); });
}

function updateJobMeta(job) {
  var locs = JSON.parse(job.locations || '[]').join(', ');
  document.getElementById('job-title').textContent = locs || ('Job #' + job.id);
  document.getElementById('job-meta').textContent = job.leads_found + ' leads - ' + job.status + ' - sources: ' + job.sources;
  loadJobs();
}

function loadJobs() {
  fetch(API + '/api/jobs/').then(function(r) { return r.json(); }).then(function(jobs) {
    var list = document.getElementById('jobs-list');
    list.innerHTML = '';
    jobs.slice().reverse().forEach(function(job) {
      var locs = JSON.parse(job.locations || '[]').join(', ');
      var div = document.createElement('div');
      div.className = 'job-card' + (job.id === currentJobId ? ' active' : '');
      div.dataset.id = job.id;
      div.onclick = function() { loadJob(job.id); };
      div.innerHTML = '<div class="job-card-top"><span class="job-id">#' + job.id + '</span><span class="badge ' + job.status + '">' + job.status.toUpperCase() + '</span></div><div class="job-meta">' + locs + ' - ' + job.leads_found + ' leads</div>';
      list.appendChild(div);
    });
  });
}

// ── source filter ──
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderTable();
}

// ── render table (ALL filtering happens here, client-side) ──
function renderTable() {
  var rows = allLeads;

  // 1. source filter
  if (currentFilter !== 'all') {
    rows = rows.filter(function(l) { return l.source === currentFilter; });
  }

  // 2. email-only — strictly enforced: no email = hidden
  if (emailOnlyActive) {
    rows = rows.filter(function(l) { return l.email && l.email.trim() !== ''; });
  }

  // 3. provider filter (only when email-only is on and at least one provider selected)
  if (emailOnlyActive && activeProviders.size > 0) {
    rows = rows.filter(function(l) {
      return activeProviders.has(emailProvider(l.email));
    });
  }

  var tbody = document.getElementById('tbody');
  var empty = document.getElementById('empty-msg');
  var chip  = document.getElementById('count-chip');

  chip.textContent = rows.length + ' lead' + (rows.length !== 1 ? 's' : '');

  if (!rows.length) {
    tbody.innerHTML = '';
    empty.style.display = '';
    empty.textContent = allLeads.length
      ? (emailOnlyActive ? 'No leads with email match the current filters.' : 'No leads for this filter.')
      : 'No leads yet \u2014 job is running...';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = rows.map(function(l) {
    var ep = emailProvider(l.email);
    var epDot = ep ? '<span class="ep-dot ep-' + ep + '" title="' + ep + '"></span>' : '';
    return '<tr>'
      + '<td><span class="src-badge ' + l.source + '">' + l.source + '</span></td>'
      + '<td>' + (l.name || '-') + '</td>'
      + '<td>' + (l.phone || '-') + '</td>'
      + '<td>' + (l.email ? epDot + '<a href="mailto:' + l.email + '">' + l.email + '</a>' : '-') + '</td>'
      + '<td>' + (l.website ? '<a href="' + l.website + '" target="_blank" rel="noopener">link</a>' : '-') + '</td>'
      + '<td>' + (l.address || '-') + '</td>'
      + '<td>' + (l.rating || '-') + '</td>'
      + '<td>' + (l.category || '-') + '</td>'
      + '<td>' + (l.location || '-') + '</td>'
      + '<td>' + (l.niche || '-') + '</td>'
      + '</tr>';
  }).join('');
}

// ── export (respects active filters) ──
function exportCSV() {
  var rows = allLeads;
  if (currentFilter !== 'all') rows = rows.filter(function(l) { return l.source === currentFilter; });
  if (emailOnlyActive) rows = rows.filter(function(l) { return l.email && l.email.trim() !== ''; });
  if (emailOnlyActive && activeProviders.size > 0) {
    rows = rows.filter(function(l) { return activeProviders.has(emailProvider(l.email)); });
  }
  if (!rows.length) { alert('No leads to export.'); return; }
  var cols = ['source','name','phone','email','website','address','rating','category','location','niche'];
  var lines = [cols.join(',')];
  rows.forEach(function(r) {
    lines.push(cols.map(function(c) { return '"' + String(r[c] || '').replace(/"/g, '""') + '"'; }).join(','));
  });
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(lines.join('\n'));
  a.download = 'leads_job_' + currentJobId + '.csv';
  a.click();
}

loadJobs();
</script>
</body>
</html>
