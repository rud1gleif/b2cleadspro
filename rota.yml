# Rota proxy router config
# See: https://github.com/alpkeskin/rota
server:
  host: 0.0.0.0
  port: 8000

proxies:
  # Add your proxies here
  # Example:
  # - url: http://user:pass@proxy-host:port
  #   type: residential
  #   country: US
  #   sticky: false

health_check:
  enabled: true
  interval: 60
  timeout: 10

rotation:
  strategy: round_robin  # round_robin | random | weighted
  cooldown_on_fail: 120  # seconds
  max_failures: 3
