version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: b2c
      POSTGRES_PASSWORD: b2cpass
      POSTGRES_DB: b2cleads
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U b2c -d b2cleads"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://b2c:b2cpass@db:5432/b2cleads
      CONCURRENCY: 5
      MAX_PAGES: 10
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/.venv

volumes:
  pgdata:
